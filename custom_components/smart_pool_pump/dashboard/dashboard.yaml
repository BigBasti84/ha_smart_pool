title: Smart Pool
views:
  - title: Overview
    path: overview
    icon: mdi:pool
    cards:
      - type: entities
        title: Smart Pool Status
        entities:
          - entity: select.smart_pool_season_mode
          - entity: select.smart_pool_summer_heating
          - entity: binary_sensor.smart_pool_test_mode
          - entity: sensor.smart_pool_winter_state
          - entity: sensor.smart_pool_outdoor_temperature
          - entity: sensor.smart_pool_pool_temperature
          - entity: sensor.smart_pool_target_runtime
          - entity: sensor.smart_pool_actual_runtime
          - entity: sensor.smart_pool_planned_slots
          - entity: sensor.smart_pool_controller_update
          - entity: sensor.smart_pool_action_log
          - entity: sensor.smart_pool_summer_pump_state
          - entity: sensor.smart_pool_actual_volume
          - entity: sensor.smart_pool_target_volume

      - type: markdown
        title: Summer Filtration Progress
        content: |
          {% set state = states('sensor.smart_pool_summer_pump_state') %}
          {% set actual = states('sensor.smart_pool_actual_volume') | float(0) %}
          {% set target = states('sensor.smart_pool_target_volume') | float(0) %}
          {% set achieved = state_attr('sensor.smart_pool_summer_pump_state', 'volume_target_achieved') %}
          {% set pct = ((actual / target * 100) | round(0)) if target > 0 else 0 %}
          **State:** {{ state }} | **Flow:** {{ state_attr('sensor.smart_pool_summer_pump_state', 'flow_rate_m3h') | round(1) }} m³/h
          **Progress:** {{ actual }} / {{ target }} m³ ({{ pct }}%){% if achieved %} ✅ target met{% endif %}

      - type: markdown
        title: Controller Update Status
        content: |
          {% set s = states('sensor.smart_pool_controller_update') %}
          {% set last_at = state_attr('sensor.smart_pool_controller_update', 'last_at') or 'never' %}
          {% set ctx = state_attr('sensor.smart_pool_controller_update', 'context') or '' %}
          {% if s == 'running' %}
          ⏳ **Update running** — {{ ctx }}{% if ctx %} (started {{ last_at }}){% endif %}
          {% elif s == 'success' %}
          ✅ **Last update succeeded** — {{ last_at }}{% if ctx %} ({{ ctx }}){% endif %}
          {% elif s == 'failed' %}
          ❌ **Last update FAILED** — {{ last_at }}{% if ctx %} ({{ ctx }}){% endif %}
          {% else %}
          ℹ️ No controller update recorded yet.
          {% endif %}

      - type: markdown
        title: Last 20 Actions
        content: |
          {% set items = state_attr('sensor.smart_pool_action_log', 'entries') or [] %}
          {% if items | count == 0 %}
          No actions yet.
          {% else %}
          {% for i in items %}
          **{{ i.at }}** {{ i.action }} `{{ i.field }}` {{ i.before }} → {{ i.after }} *(applied={{ i.applied }})*

          {% endfor %}
          {% endif %}
