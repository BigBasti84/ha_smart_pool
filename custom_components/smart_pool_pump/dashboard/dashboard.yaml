title: Smart Pool
views:
  # ─────────────────────────────────────────────────
  #  OVERVIEW — main page with pool data + smart pool
  # ─────────────────────────────────────────────────
  - title: Pool
    path: pool-overview
    icon: mdi:pool
    type: sections
    badges:
      - type: entity
        show_name: false
        show_state: true
        show_icon: true
        entity: sensor.pool_temperature
      - type: entity
        show_name: false
        show_state: true
        show_icon: true
        entity: sensor.pool_cl
      - type: entity
        show_name: false
        show_state: true
        show_icon: true
        entity: sensor.pool_ph
      - type: entity
        show_name: false
        show_state: true
        show_icon: true
        entity: select.pool_pump_mode
    sections:
      # --- Pool sensors ---
      - type: grid
        cards:
          - type: heading
            heading_style: title
            heading: Pool Status
            icon: mdi:database
          - graph: line
            type: sensor
            entity: sensor.pool_temperature
            detail: 1
            theme: Mushroom
            name: Wassertemperatur
            hours_to_show: 12
          - graph: line
            type: sensor
            entity: sensor.pool_ph
            detail: 1
            theme: Mushroom
            name: PH Wert
            hours_to_show: 12
          - graph: line
            type: sensor
            entity: sensor.pool_cl
            detail: 1
            theme: Mushroom
            name: Chlor
            hours_to_show: 12

      # --- Pool pump hardware ---
      - type: grid
        cards:
          - type: heading
            heading: Pool Pumpe
            heading_style: title
            icon: mdi:water
          - type: entity
            entity: switch.pool_filtration
            name: Pumpen-Status
            icon: mdi:waves-arrow-right
          - type: entity
            entity: select.pool_pump_mode
            name: Pumpen-Modus
          - type: entity
            entity: input_boolean.pool_heating
            name: Überschuss Heizen
            icon: mdi:heat-pump-outline

      # --- Electrolysis ---
      - type: grid
        cards:
          - type: heading
            heading: Elektrolyse
            heading_style: title
            icon: mdi:debug-step-out
          - type: gauge
            entity: sensor.pool_electrolysis
            theme: Mushroom
            needle: false
            grid_options:
              columns: 12
              rows: auto

      # --- Smart Pool summary ---
      - type: grid
        cards:
          - type: heading
            heading: Smart Pool
            heading_style: title
            icon: mdi:brain
          - type: markdown
            content: >
              {% set season = states('select.smart_pool_season_mode') | lower %}
              {% set pump_st = states('sensor.smart_pool_summer_pump_state') %}
              {% set win_st  = states('sensor.smart_pool_winter_state') %}
              {% set actual  = states('sensor.smart_pool_actual_volume') | float(0) %}
              {% set target  = states('sensor.smart_pool_target_volume') | float(0) %}
              {% set achieved = state_attr('sensor.smart_pool_summer_pump_state', 'volume_target_achieved') %}
              {% set pct = ((actual / target * 100) | round(0)) if target > 0 else 0 %}
              {% set bar_fill = [((pct / 100) * 20) | int, 20] | min %}
              {% set bw_state = states('sensor.smart_pool_backwash_reminder') %}
              {% set last_bw  = state_attr('sensor.smart_pool_backwash_reminder', 'last_backwash_date') or 'nie' %}

              {% if bw_state == 'due' %}
              ⚠️ **Rückspülung fällig!** (zuletzt: {{ last_bw }})

              ---
              {% endif %}

              **Saison:** {{ 'Sommer ☀️' if season == 'summer' else 'Winter ❄️' }}

              {% if season == 'summer' %}
              **Pumpe:** {{ pump_st }}
              **Volumen:** {{ actual | round(2) }} / {{ target | round(2) }} m³ ({{ pct }}%){% if achieved %} ✅{% endif %}
              `[{{ '█' * bar_fill }}{{ '░' * (20 - bar_fill) }}]`
              **Laufzeit:** {{ states('sensor.smart_pool_actual_runtime') | int(0) }} / {{ states('sensor.smart_pool_target_runtime') | int(0) }} min
              {% else %}
              **Zustand:** {{ win_st }}
              **Laufzeit heute:** {{ states('sensor.smart_pool_actual_runtime') | int(0) }} min
              {% endif %}
          - type: entity
            entity: sensor.smart_pool_backwash_reminder
            name: Rückspülung
            icon: mdi:filter-check

  # ─────────────────────────────────────────────────
  #  ADMIN — detailed control & monitoring
  # ─────────────────────────────────────────────────
  - title: Admin
    path: admin
    icon: mdi:cog
    cards:
      - type: entities
        title: Smart Pool Status
        entities:
          - entity: button.smart_pool_force_check
            name: Force Check
          - entity: select.smart_pool_season_mode
            name: Season Mode
          - entity: select.smart_pool_summer_heating
            name: Summer Heating
          - entity: binary_sensor.smart_pool_test_mode
            name: Test Mode
          - entity: sensor.smart_pool_winter_state
            name: State
          - entity: sensor.smart_pool_outdoor_temperature
            name: Outdoor Temp
          - entity: sensor.smart_pool_pool_temperature
            name: Pool Temp
          - entity: sensor.smart_pool_target_runtime
            name: Target Runtime
          - entity: sensor.smart_pool_actual_runtime
            name: Actual Runtime
          - entity: sensor.smart_pool_planned_slots
            name: Planned Slots
          - entity: sensor.smart_pool_controller_update
            name: Controller Update
          - entity: sensor.smart_pool_action_log
            name: Action Log
          - entity: sensor.smart_pool_summer_pump_state
            name: Summer Pump State
          - entity: sensor.smart_pool_actual_volume
            name: Actual Volume
          - entity: sensor.smart_pool_target_volume
            name: Target Volume
          - entity: sensor.smart_pool_backwash_reminder
            name: Backwash Reminder

      - type: markdown
        title: Summer Filtration Progress
        content: |
          {% set wanted = states('sensor.smart_pool_summer_pump_state') %}
          {% set dev_mode = state_attr('sensor.smart_pool_summer_pump_state', 'device_mode') | default('unknown') %}
          {% set dev_sw   = state_attr('sensor.smart_pool_summer_pump_state', 'device_switch') | default('unknown') %}
          {% set actual = states('sensor.smart_pool_actual_volume') | float(0) %}
          {% set target = states('sensor.smart_pool_target_volume') | float(0) %}
          {% set achieved = state_attr('sensor.smart_pool_summer_pump_state', 'volume_target_achieved') %}
          {% set pct = ((actual / target * 100) | round(0)) if target > 0 else 0 %}
          {% set sw_wanted = 'on' if wanted in ['filtration', 'heat', 'filtration(priming)'] else 'off' %}
          {% set match = (sw_wanted == dev_sw) %}
          **Wanted:** {{ wanted }} | **Device:** mode={{ dev_mode }}, sw={{ dev_sw }} {{ '✅' if match else '❌' }}
          **Flow:** {{ (state_attr('sensor.smart_pool_summer_pump_state', 'flow_rate_m3h') | float(0)) | round(1) }} m³/h
          **Progress:** {{ actual }} / {{ target }} m³ ({{ pct }}%){% if achieved %} ✅ target met{% endif %}

      - type: markdown
        title: Controller Update Status
        content: |
          {% set s = states('sensor.smart_pool_controller_update') %}
          {% set last_at = state_attr('sensor.smart_pool_controller_update', 'last_at') or 'never' %}
          {% set ctx = state_attr('sensor.smart_pool_controller_update', 'context') or '' %}
          {% if s == 'running' %}
          ⏳ **Update running** — {{ ctx }}{% if ctx %} (started {{ last_at }}){% endif %}
          {% elif s == 'success' %}
          ✅ **Last update succeeded** — {{ last_at }}{% if ctx %} ({{ ctx }}){% endif %}
          {% elif s == 'failed' %}
          ❌ **Last update FAILED** — {{ last_at }}{% if ctx %} ({{ ctx }}){% endif %}
          {% else %}
          ℹ️ No controller update recorded yet.
          {% endif %}

      - type: markdown
        title: Last 50 Actions
        content: |
          {% set items = state_attr('sensor.smart_pool_action_log', 'entries') or [] %}
          {% if items | count == 0 %}
          No actions yet.
          {% else %}
          {% for i in items %}
          **{{ i.at }}** {{ i.action }} `{{ i.field }}` {{ i.before }} → {{ i.after }} *(applied={{ i.applied }})*

          {% endfor %}
          {% endif %}

  - title: Daily Summary
    path: daily-summary
    icon: mdi:chart-bar
    cards:
      - type: markdown
        title: "Today's Summary"
        content: >
          {% set season = states('select.smart_pool_season_mode') | lower %}
          {% set s = 'sensor.smart_pool_daily_summary' %}
          {% set total_h   = states(s) | float(0) %}
          {% set heat_h    = state_attr(s, 'heat_hours') | float(0) %}
          {% set filt_h    = state_attr(s, 'filtration_hours') | float(0) %}
          {% set wnorm_h   = state_attr(s, 'winter_normal_hours') | float(0) %}
          {% set wfree_h   = state_attr(s, 'winter_freeze_hours') | float(0) %}
          {% set wext_h    = state_attr(s, 'winter_extreme_hours') | float(0) %}
          {% set vol       = state_attr(s, 'volume_m3') | float(0) %}
          {% set tgt       = state_attr(s, 'target_volume_m3') | float(0) %}
          {% set achieved  = state_attr(s, 'volume_target_achieved') %}
          {% set pct       = ((vol / tgt * 100) | round(0)) if tgt > 0 else 0 %}
          {% set pump_st   = state_attr(s, 'summer_pump_state') %}
          {% set win_st    = state_attr(s, 'winter_state') %}

          **Season:** {{ season | capitalize }}
          {% if season == 'summer' %}
          **Pump state:** {{ pump_st }}
          {% set bar_fill = [((pct / 100) * 20) | int, 20] | min %}
          **Volume:** {{ vol }} / {{ tgt }} m³ ({{ pct }}%)  {% if achieved %}✅{% endif %}
          `[{{ '█' * bar_fill }}{{ '░' * (20 - bar_fill) }}]`
          {% else %}
          **Winter state:** {{ win_st }}
          {% endif %}

          | Mode | Today |
          |------|-------|
          {% if season == 'summer' %}
          | ☀️ Heat (solar) | {{ heat_h | round(2) }} h |
          | 🔵 Filtration | {{ filt_h | round(2) }} h |
          {% else %}
          | 🟢 Normal | {{ wnorm_h | round(2) }} h |
          | ❄️ Freeze protection | {{ wfree_h | round(2) }} h |
          | 🧊 Extreme freeze | {{ wext_h | round(2) }} h |
          {% endif %}
          | ⏱️ **Total pump time** | **{{ total_h | round(2) }} h** |
          | 💧 **Filtered volume** | **{{ vol | round(2) }} m³** |

      - type: history-graph
        title: "Filtered Volume Today"
        hours_to_show: 24
        entities:
          - entity: sensor.smart_pool_actual_volume
            name: Volume (m³)

      - type: history-graph
        title: "Pump Mode Timeline"
        hours_to_show: 24
        entities:
          - entity: sensor.smart_pool_summer_pump_state
            name: Summer state
          - entity: sensor.smart_pool_winter_state
            name: Winter state

      - type: statistics-graph
        title: "Daily Filtered Volume (last 30 days)"
        period: day
        days_to_show: 30
        stat_type: max
        entities:
          - entity: sensor.smart_pool_actual_volume
            name: Volume (m³)

      - type: statistics-graph
        title: "Daily Runtime (last 30 days)"
        period: day
        days_to_show: 30
        stat_type: max
        entities:
          - entity: sensor.smart_pool_actual_runtime
            name: Runtime (min)
