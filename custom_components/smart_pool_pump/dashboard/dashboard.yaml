title: Smart Pool
views:
  - title: Overview
    path: overview
    icon: mdi:pool
    cards:
      - type: entities
        title: Smart Pool Status
        entities:
          - entity: select.smart_pool_season_mode
          - entity: select.smart_pool_summer_heating
          - entity: binary_sensor.smart_pool_test_mode
          - entity: sensor.smart_pool_winter_state
          - entity: sensor.smart_pool_outdoor_temperature
          - entity: sensor.smart_pool_pool_temperature
          - entity: sensor.smart_pool_target_runtime
          - entity: sensor.smart_pool_actual_runtime
          - entity: sensor.smart_pool_planned_slots
          - entity: sensor.smart_pool_controller_update
          - entity: sensor.smart_pool_action_log
          - entity: sensor.smart_pool_summer_pump_state
          - entity: sensor.smart_pool_actual_volume
          - entity: sensor.smart_pool_target_volume

      - type: markdown
        title: Summer Filtration Progress
        content: |
          {% set state = states('sensor.smart_pool_summer_pump_state') %}
          {% set actual = states('sensor.smart_pool_actual_volume') | float(0) %}
          {% set target = states('sensor.smart_pool_target_volume') | float(0) %}
          {% set achieved = state_attr('sensor.smart_pool_summer_pump_state', 'volume_target_achieved') %}
          {% set pct = ((actual / target * 100) | round(0)) if target > 0 else 0 %}
          **State:** {{ state }} | **Flow:** {{ (state_attr('sensor.smart_pool_summer_pump_state', 'flow_rate_m3h') | float(0)) | round(1) }} m³/h
          **Progress:** {{ actual }} / {{ target }} m³ ({{ pct }}%){% if achieved %} ✅ target met{% endif %}

      - type: markdown
        title: Controller Update Status
        content: |
          {% set s = states('sensor.smart_pool_controller_update') %}
          {% set last_at = state_attr('sensor.smart_pool_controller_update', 'last_at') or 'never' %}
          {% set ctx = state_attr('sensor.smart_pool_controller_update', 'context') or '' %}
          {% if s == 'running' %}
          ⏳ **Update running** — {{ ctx }}{% if ctx %} (started {{ last_at }}){% endif %}
          {% elif s == 'success' %}
          ✅ **Last update succeeded** — {{ last_at }}{% if ctx %} ({{ ctx }}){% endif %}
          {% elif s == 'failed' %}
          ❌ **Last update FAILED** — {{ last_at }}{% if ctx %} ({{ ctx }}){% endif %}
          {% else %}
          ℹ️ No controller update recorded yet.
          {% endif %}

      - type: markdown
        title: Last 20 Actions
        content: |
          {% set items = state_attr('sensor.smart_pool_action_log', 'entries') or [] %}
          {% if items | count == 0 %}
          No actions yet.
          {% else %}
          {% for i in items %}
          **{{ i.at }}** {{ i.action }} `{{ i.field }}` {{ i.before }} → {{ i.after }} *(applied={{ i.applied }})*

          {% endfor %}
          {% endif %}

  - title: Daily Summary
    path: daily-summary
    icon: mdi:chart-bar
    cards:
      - type: markdown
        title: "Today's Summary"
        content: >
          {% set season = states('select.smart_pool_season_mode') | lower %}
          {% set s = 'sensor.smart_pool_daily_summary' %}
          {% set total_h   = states(s) | float(0) %}
          {% set heat_h    = state_attr(s, 'heat_hours') | float(0) %}
          {% set filt_h    = state_attr(s, 'filtration_hours') | float(0) %}
          {% set wnorm_h   = state_attr(s, 'winter_normal_hours') | float(0) %}
          {% set wfree_h   = state_attr(s, 'winter_freeze_hours') | float(0) %}
          {% set wext_h    = state_attr(s, 'winter_extreme_hours') | float(0) %}
          {% set vol       = state_attr(s, 'volume_m3') | float(0) %}
          {% set tgt       = state_attr(s, 'target_volume_m3') | float(0) %}
          {% set achieved  = state_attr(s, 'volume_target_achieved') %}
          {% set pct       = ((vol / tgt * 100) | round(0)) if tgt > 0 else 0 %}
          {% set pump_st   = state_attr(s, 'summer_pump_state') %}
          {% set win_st    = state_attr(s, 'winter_state') %}

          **Season:** {{ season | capitalize }}
          {% if season == 'summer' %}
          **Pump state:** {{ pump_st }}
          {% set bar_fill = [((pct / 100) * 20) | int, 20] | min %}
          **Volume:** {{ vol }} / {{ tgt }} m³ ({{ pct }}%)  {% if achieved %}✅{% endif %}
          `[{{ '█' * bar_fill }}{{ '░' * (20 - bar_fill) }}]`
          {% else %}
          **Winter state:** {{ win_st }}
          {% endif %}

          | Mode | Today |
          |------|-------|
          {% if season == 'summer' %}
          | ☀️ Heat (solar) | {{ heat_h | round(2) }} h |
          | 🔵 Filtration | {{ filt_h | round(2) }} h |
          {% else %}
          | 🟢 Normal | {{ wnorm_h | round(2) }} h |
          | ❄️ Freeze protection | {{ wfree_h | round(2) }} h |
          | 🧊 Extreme freeze | {{ wext_h | round(2) }} h |
          {% endif %}
          | ⏱️ **Total pump time** | **{{ total_h | round(2) }} h** |
          | 💧 **Filtered volume** | **{{ vol | round(2) }} m³** |

      - type: history-graph
        title: "Filtered Volume Today"
        hours_to_show: 24
        entities:
          - entity: sensor.smart_pool_actual_volume
            name: Volume (m³)

      - type: history-graph
        title: "Pump Mode Timeline"
        hours_to_show: 24
        entities:
          - entity: sensor.smart_pool_summer_pump_state
            name: Summer state
          - entity: sensor.smart_pool_winter_state
            name: Winter state

      - type: statistics-graph
        title: "Daily Filtered Volume (last 30 days)"
        period: day
        days_to_show: 30
        stat_type: max
        entities:
          - entity: sensor.smart_pool_actual_volume
            name: Volume (m³)

      - type: statistics-graph
        title: "Daily Runtime (last 30 days)"
        period: day
        days_to_show: 30
        stat_type: max
        entities:
          - entity: sensor.smart_pool_actual_runtime
            name: Runtime (min)
